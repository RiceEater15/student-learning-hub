<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Appointments — Lincoln East Learning Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/appointments.css">
</head>
<body>
  <div class="bg-grid"></div>

  <!-- Sidebar (same structure) -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon small">
        <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
          <path d="M18 3L33 12V24L18 33L3 24V12L18 3Z" stroke="var(--accent)" stroke-width="2" fill="none"/>
          <circle cx="18" cy="18" r="4" fill="var(--accent)"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-school-sm">Lincoln East</span>
        <span class="brand-hub-sm">Learning Hub</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <p class="nav-section-label">Main</p>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        <span>Dashboard</span>
      </a>
      <a href="appointments.html" class="nav-item active">
        <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 2v4M14 2v4M2 9h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Appointments</span>
        <span class="nav-badge" id="appt-count"></span>
      </a>
      <p class="nav-section-label">Progress</p>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 10l4 4 10-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Subjects</span>
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="3.5" stroke="currentColor" stroke-width="1.5"/><circle cx="10" cy="10" r="1" fill="currentColor"/></svg>
        <span>Goals</span>
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><path d="M4 4h12v14H4z" stroke="currentColor" stroke-width="1.5" rx="1"/><path d="M7 8h6M7 11h6M7 14h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Resources</span>
      </a>
      <p class="nav-section-label">Account</p>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span>Settings</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="sidebar-avatar">?</div>
        <div class="user-info">
          <span class="user-name" id="sidebar-name">Student</span>
          <span class="user-grade" id="sidebar-grade">Grade —</span>
        </div>
      </div>
      <button class="logout-btn" onclick="handleLogout()">
        <svg viewBox="0 0 20 20" fill="none"><path d="M13 10H3M10 7l3 3-3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M7 5H5a1 1 0 00-1 1v8a1 1 0 001 1h2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn" onclick="toggleSidebar()">
          <svg viewBox="0 0 20 20" fill="none"><path d="M3 6h14M3 10h14M3 14h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
        <div class="page-title">
          <h1>Appointments</h1>
          <p>Book and manage your tutoring sessions</p>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <button class="btn-primary" style="width:auto;padding:9px 18px;font-size:0.85rem;" onclick="openModal()">
          <svg viewBox="0 0 20 20" fill="none" style="width:15px;height:15px;"><path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Book Session
        </button>
      </div>
    </header>

    <div class="page-body">

      <!-- Filter Tabs -->
      <div class="filter-row">
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="filterAppts('all', this)">All</button>
          <button class="filter-tab" onclick="filterAppts('upcoming', this)">Upcoming</button>
          <button class="filter-tab" onclick="filterAppts('completed', this)">Completed</button>
        </div>
      </div>

      <!-- Appointments List -->
      <div id="appts-container" class="appts-grid">
        <!-- Populated by JS -->
      </div>
    </div>
  </main>

  <!-- Book Session Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3>Book a Tutoring Session</h3>
        <button class="modal-close" onclick="closeModal()">
          <svg viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="input-group">
          <label>Subject</label>
          <div class="input-wrap select-wrap">
            <select id="appt-subject">
              <option value="" disabled selected>Choose a subject</option>
              <option>Mathematics</option>
              <option>English / Language Arts</option>
              <option>Science</option>
              <option>History / Social Studies</option>
              <option>Foreign Language</option>
              <option>Computer Science</option>
              <option>Other</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
        </div>

        <div class="input-group">
          <label>Preferred Tutor (Optional)</label>
          <div class="input-wrap select-wrap">
            <select id="appt-tutor">
              <option value="">No preference</option>
              <option>Mr. Johnson</option>
              <option>Ms. Rivera</option>
              <option>Mr. Park</option>
              <option>Ms. Thompson</option>
              <option>Peer Tutor</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label>Date</label>
            <div class="input-wrap">
              <input type="date" id="appt-date" />
            </div>
          </div>
          <div class="input-group">
            <label>Time</label>
            <div class="input-wrap select-wrap">
              <select id="appt-time">
                <option value="" disabled selected>Select time</option>
                <option value="07:30">7:30 AM</option>
                <option value="08:00">8:00 AM</option>
                <option value="12:00">12:00 PM (Lunch)</option>
                <option value="15:30">3:30 PM</option>
                <option value="16:00">4:00 PM</option>
                <option value="16:30">4:30 PM</option>
              </select>
              <svg class="select-arrow" viewBox="0 0 20 20" fill="none"><path d="M5 8l5 5 5-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            </div>
          </div>
        </div>

        <div class="input-group">
          <label>Notes (Optional)</label>
          <div class="input-wrap">
            <textarea id="appt-notes" placeholder="What topics do you need help with?"></textarea>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-primary" style="width:auto;" onclick="bookAppointment()">
          <svg viewBox="0 0 20 20" fill="none" style="width:16px;height:16px;"><path d="M3 10l4 4 10-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Confirm Booking
        </button>
      </div>
    </div>
  </div>

  <script src="js/auth-guard.js"></script>
  <script src="js/appointments.js"></script>
</body>
</html>
